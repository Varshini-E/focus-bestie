<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anchor — Session</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚓</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .top-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid #1f2937;
      background: #0d0d0d;
    }
    .back-btn {
      color: #6b7280; text-decoration: none;
      font-size: 0.85rem; white-space: nowrap;
      transition: color 0.15s;
    }
    .back-btn:hover { color: #e8e8e8; }
    .block-chip { display: flex; flex-direction: column; min-width: 0; }
    .block-chip-title {
      font-size: 0.9rem; font-weight: 600; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .block-chip-meta { font-size: 0.75rem; color: #6b7280; }

    /* ── Main area: left timer + right convo ── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Timer panel (left) ── */
    .timer-panel {
      flex-shrink: 0;
      width: 260px;
      border-right: 1px solid #1f2937;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      padding: 1.25rem 1rem;
      overflow-y: auto;
      background: #0d0d0d;
    }

    .timer-heading { font-size: 0.78rem; color: #4b5563; text-transform: uppercase; letter-spacing: 0.06em; }
    .timer-task    { font-size: 0.9rem; font-weight: 600; color: #f3f4f6; line-height: 1.3; }

    .timer-range {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.8rem; color: #6b7280;
    }
    .timer-range .t { color: #9ca3af; font-weight: 500; }
    .timer-arrow { color: #374151; font-size: 0.7rem; }

    .timer-display {
      font-size: 3rem; font-weight: 700; letter-spacing: 0.03em;
      color: #f3f4f6; font-variant-numeric: tabular-nums;
      text-align: center; line-height: 1;
      transition: color 0.3s;
    }
    .timer-display.running { color: #60a5fa; }
    .timer-display.done    { color: #4ade80; }

    .timer-controls { display: flex; gap: 0.4rem; }
    .timer-btn {
      flex: 1; padding: 0.5rem 0.4rem;
      border-radius: 8px; border: 1px solid #2a2a2a;
      background: #1a1a1a; color: #9ca3af;
      font-size: 0.8rem; font-weight: 600;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .timer-btn:hover:not(:disabled) { border-color: #555; color: #e8e8e8; background: #222; }
    .timer-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .timer-btn.primary { background: #1d3a6e; border-color: #2563eb44; color: #93c5fd; }
    .timer-btn.primary:hover:not(:disabled) { background: #2563eb; border-color: #2563eb; color: #fff; }

    .timer-divider { border: none; border-top: 1px solid #1f2937; }

    /* ── Wrap-up section ── */
    .wrapup { display: flex; flex-direction: column; gap: 0.75rem; }
    .wrapup-label { font-size: 0.75rem; color: #4b5563; text-transform: uppercase; letter-spacing: 0.06em; }

    .energy-row { display: flex; flex-direction: column; gap: 0.35rem; }
    .energy-top  { display: flex; align-items: center; gap: 0.5rem; }
    .energy-lbl  { font-size: 0.8rem; color: #6b7280; }
    .energy-btns { display: flex; gap: 0.25rem; }
    .energy-btn {
      width: 1.9rem; height: 1.9rem; border-radius: 50%;
      border: 1px solid #2a2a2a; background: #1a1a1a;
      color: #6b7280; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .energy-btn:hover { border-color: #555; color: #9ca3af; }
    .energy-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    .energy-desc { font-size: 0.73rem; color: #6b7280; }

    .complete-btn {
      width: 100%; background: #16a34a; color: #fff;
      border: none; border-radius: 8px; padding: 0.65rem;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .complete-btn:hover:not(:disabled) { background: #15803d; }
    .complete-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Conversation panel (right) ── */
    .convo-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .transcript {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 82%; padding: 0.65rem 0.9rem;
      border-radius: 12px; font-size: 0.9rem; line-height: 1.5;
      animation: fadeIn 0.18s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg-ai   { background: #1a1a1a; border: 1px solid #2a2a2a; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg-user { background: #1e3a5f; border: 1px solid #2563eb44; align-self: flex-end; border-bottom-right-radius: 4px; color: #bfdbfe; }

    .msg-label { font-size: 0.68rem; color: #4b5563; margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }

    .typing-indicator {
      display: flex; gap: 4px; align-items: center;
      padding: 0.65rem 0.9rem; background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 12px; border-bottom-left-radius: 4px;
      align-self: flex-start; width: fit-content;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #4b5563; animation: bounce 1.2s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-5px); opacity: 1; } }

    /* ── State bar ── */
    .state-bar {
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; font-size: 0.78rem;
      color: #4b5563; padding: 0.3rem 1rem; min-height: 1.6rem; transition: color 0.2s;
    }
    .state-bar.listening { color: #f87171; }
    .state-bar.speaking  { color: #4ade80; }

    /* ── Waveform (shown while agent speaks) ── */
    .waveform {
      display: none; align-items: center; gap: 3px; height: 20px;
    }
    .waveform.active { display: flex; }
    .waveform-bar {
      width: 3px; border-radius: 3px; background: #4ade80;
      animation: wave-rise 1.0s infinite ease-in-out;
    }
    .waveform-bar:nth-child(1) { animation-delay: 0.00s; animation-duration: 1.1s; }
    .waveform-bar:nth-child(2) { animation-delay: 0.15s; animation-duration: 0.85s; }
    .waveform-bar:nth-child(3) { animation-delay: 0.30s; animation-duration: 1.25s; }
    .waveform-bar:nth-child(4) { animation-delay: 0.10s; animation-duration: 0.95s; }
    .waveform-bar:nth-child(5) { animation-delay: 0.20s; animation-duration: 1.15s; }
    .waveform-bar:nth-child(6) { animation-delay: 0.05s; animation-duration: 0.9s;  }
    .waveform-bar:nth-child(7) { animation-delay: 0.25s; animation-duration: 1.05s; }
    @keyframes wave-rise {
      0%, 100% { height: 3px; }
      50%       { height: 18px; }
    }

    /* ── Input bar ── */
    .input-bar {
      flex-shrink: 0; display: flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 1rem; border-top: 1px solid #1f2937; background: #0f0f0f;
    }
    .mic-btn {
      flex-shrink: 0; width: 2.8rem; height: 2.8rem; border-radius: 50%;
      border: 1px solid #374151; background: #1f2937; color: #9ca3af;
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
    }
    .mic-btn:hover:not(:disabled) { background: #374151; color: #e8e8e8; }
    .mic-btn.listening {
      background: #450a0a; border-color: #ef4444; color: #f87171;
      animation: pulse-ring 1.2s infinite;
    }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0   rgba(239,68,68,0.3); }
      70%  { box-shadow: 0 0 0 8px rgba(239,68,68,0);   }
      100% { box-shadow: 0 0 0 0   rgba(239,68,68,0);   }
    }
    .mic-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .mic-btn.no-speech { display: none; }

    /* ── Struggling to start button ── */
    .initiation-trigger {
      width: 100%; background: transparent; color: #4b5563;
      border: 1px dashed #2a2a2a; border-radius: 8px; padding: 0.5rem;
      font-size: 0.8rem; font-weight: 500; cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .initiation-trigger:hover { color: #9ca3af; border-color: #4b5563; }

    /* ── Resume timer button (shown after initiation) ── */
    .resume-timer-btn {
      width: 100%; background: #16a34a; color: #fff;
      border: none; border-radius: 8px; padding: 0.6rem;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .resume-timer-btn:hover { background: #15803d; }

    /* ── Initiation overlay ── */
    .initiation-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; padding: 1.5rem;
    }
    .initiation-card {
      background: #111; border: 1px solid #2a2a2a; border-radius: 16px;
      padding: 1.75rem 1.5rem; max-width: 400px; width: 100%;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .initiation-heading {
      font-size: 1rem; font-weight: 700; color: #f3f4f6;
      letter-spacing: -0.01em; text-align: center;
    }
    /* 2-min countdown inside overlay */
    .init-timer-display {
      font-size: 2.8rem; font-weight: 700; letter-spacing: 0.04em;
      color: #60a5fa; text-align: center; font-variant-numeric: tabular-nums;
    }
    /* Spoken text */
    .initiation-spoken {
      font-size: 0.88rem; color: #9ca3af; line-height: 1.55; text-align: center;
    }
    /* Step breakdown */
    .initiation-steps {
      display: flex; flex-direction: column; gap: 0.4rem;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 8px; padding: 0.75rem 0.9rem;
      font-size: 0.85rem; color: #d1d5db; line-height: 1.5;
    }
    .initiation-steps:empty { display: none; }
    /* Go-back button inside overlay */
    .initiation-end-btn {
      width: 100%; background: #1f2937; color: #e5e7eb;
      border: 1px solid #374151; border-radius: 8px;
      padding: 0.55rem; font-size: 0.82rem; font-weight: 500;
      cursor: pointer; transition: color 0.15s, border-color 0.15s;
    }
    .initiation-end-btn:hover { background:#111827; border-color:#4b5563; }
    .initiation-end-btn#initiation-continue-btn {
      background: #16a34a; border-color: #16a34a; color: #fff;
      margin-top: 0.35rem;
    }
    .initiation-end-btn#initiation-continue-btn:hover {
      background: #15803d; border-color: #15803d;
    }

    .text-input {
      flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
      color: #e8e8e8; font-size: 0.9rem; font-family: inherit;
      padding: 0.55rem 0.85rem; outline: none; transition: border-color 0.15s;
    }
    .text-input:focus { border-color: #555; }
    .text-input:disabled { opacity: 0.35; }

    .send-btn {
      flex-shrink: 0; width: 2.4rem; height: 2.4rem; border-radius: 8px;
      border: none; background: #2563eb; color: #fff; font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, opacity 0.15s;
    }
    .send-btn:hover:not(:disabled) { background: #1d4ed8; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Mobile: stack vertically ── */
    @media (max-width: 620px) {
      .main { flex-direction: column; }
      .timer-panel {
        width: 100%; border-right: none; border-bottom: 1px solid #1f2937;
        flex-direction: row; flex-wrap: wrap; gap: 0.75rem; padding: 0.85rem 1rem;
        align-items: center;
      }
      .timer-display { font-size: 2rem; }
      .timer-controls { min-width: 140px; }
      .timer-divider  { display: none; }
      .wrapup { flex-direction: row; flex-wrap: wrap; align-items: center; gap: 0.6rem; flex: 1; }
      .wrapup-label { display: none; }
      .complete-btn { width: auto; padding: 0.5rem 1rem; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="top-bar">
    <a class="back-btn" href="#" onclick="goBack(); return false;">← Plan</a>
    <div class="block-chip">
      <div class="block-chip-title" id="block-title">Loading…</div>
      <div class="block-chip-meta" id="block-chip-meta"></div>
    </div>
  </div>

  <!-- Main layout -->
  <div class="main">

    <!-- Left: Timer panel -->
    <div class="timer-panel">
      <div>
        <div class="timer-heading">Current block</div>
        <div class="timer-task" id="timer-task">—</div>
        <div class="timer-range" style="margin-top:0.35rem;">
          <span class="t" id="timer-start">—</span>
          <span class="timer-arrow">→</span>
          <span class="t" id="timer-end">—</span>
        </div>
      </div>

      <div class="timer-display" id="timer-display">00:00</div>

      <div class="timer-controls">
        <button class="timer-btn primary" id="start-timer-btn" onclick="startTimer()">▶ Start</button>
        <button class="timer-btn"         id="stop-timer-btn"  onclick="endTimer()"   disabled>⏹ End</button>
        <button class="timer-btn"         id="reset-timer-btn" onclick="resetTimer()">↺</button>
      </div>

      <hr class="timer-divider" />

      <div class="wrapup">
        <div class="wrapup-label">Wrap up</div>

        <div class="energy-row">
          <div class="energy-top">
            <span class="energy-lbl">Load</span>
            <div class="energy-btns" id="load-btns">
              <button class="energy-btn"        data-val="1" onclick="selectLoad(1)">1</button>
              <button class="energy-btn"        data-val="2" onclick="selectLoad(2)">2</button>
              <button class="energy-btn active" data-val="3" onclick="selectLoad(3)">3</button>
              <button class="energy-btn"        data-val="4" onclick="selectLoad(4)">4</button>
              <button class="energy-btn"        data-val="5" onclick="selectLoad(5)">5</button>
            </div>
          </div>
          <div class="energy-desc" id="load-desc">Moderate</div>
        </div>

        <div class="energy-row">
          <div class="energy-top">
            <span class="energy-lbl">Energy</span>
            <div class="energy-btns" id="energy-btns">
              <button class="energy-btn"        data-val="1" onclick="selectEnergy(1)">1</button>
              <button class="energy-btn"        data-val="2" onclick="selectEnergy(2)">2</button>
              <button class="energy-btn active" data-val="3" onclick="selectEnergy(3)">3</button>
              <button class="energy-btn"        data-val="4" onclick="selectEnergy(4)">4</button>
              <button class="energy-btn"        data-val="5" onclick="selectEnergy(5)">5</button>
            </div>
          </div>
          <div class="energy-desc" id="energy-desc">Neutral</div>
        </div>

        <button class="complete-btn" id="complete-btn" onclick="completeAndReplan()">
          Complete &amp; Replan Day
        </button>

        <button class="initiation-trigger" onclick="openInitiation()">
          Struggling to start?
        </button>

        <button class="resume-timer-btn" id="resume-timer-btn" style="display:none;"
                onclick="resumeAfterInitiation()">
          ▶ Resume timer
        </button>
      </div>
    </div>

    <!-- Right: Conversation -->
    <div class="convo-panel">
      <div class="transcript" id="transcript"></div>
      <div class="state-bar" id="state-bar">
        <div class="waveform" id="waveform">
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
          <div class="waveform-bar"></div>
        </div>
        <span id="state-label"></span>
      </div>
      <div class="input-bar">
        <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Tap to speak">🎙️</button>
        <input  class="text-input" id="text-input" type="text"
                placeholder="Or type here…"
                onkeydown="if(event.key==='Enter' && !this.disabled) sendText()" />
        <button class="send-btn" id="send-btn" onclick="sendText()">↑</button>
      </div>
    </div>

  </div>

  <!-- Initiation overlay -->
  <div class="initiation-overlay" id="initiation-overlay" style="display:none;">
    <div class="initiation-card">
      <div class="initiation-heading" id="initiation-heading">Just 2 minutes ✦</div>
      <div class="init-timer-display" id="init-timer-display">02:00</div>
      <div class="initiation-spoken" id="initiation-text">Loading…</div>
      <div class="initiation-steps"  id="initiation-breakdown"></div>
      <button class="initiation-end-btn" id="initiation-end-btn" onclick="closeInitiationEarly()">Go back to session</button>
      <button class="initiation-end-btn" id="initiation-continue-btn" style="display:none;" onclick="continueAfterInitiation()">▶ Continue session</button>
    </div>
  </div>

  <script src="/static/session.js"></script>
</body>
</html>
